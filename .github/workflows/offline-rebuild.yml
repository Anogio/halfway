name: offline-rebuild

on:
  workflow_dispatch:
    inputs:
      gtfs_zip_url:
        description: "Direct URL to GTFS zip archive"
        required: true
        type: string

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Download GTFS zip
        run: curl -fL "${{ inputs.gtfs_zip_url }}" -o /tmp/gtfs.zip

      - name: Extract GTFS files
        run: |
          mkdir -p gouv_paris_gtfs-export
          unzip -o /tmp/gtfs.zip -d gouv_paris_gtfs-export

      - name: Build offline artifacts
        run: make build-offline

      - name: Upload rebuilt artifacts
        uses: actions/upload-artifact@v4
        with:
          name: offline-artifacts-rebuild
          path: backend/offline/data/artifacts
          if-no-files-found: error
