[project]
name = "transportation-heatmap"

[paths]
offline_raw_dir = "offline/data/raw"
offline_interim_dir = "offline/data/interim"
offline_artifacts_dir = "offline/data/artifacts"

[service]
weekdays_only = true
exclude_holidays = true

[modes]
include_route_types = [0, 1, 2, 3, 6, 7]
include_all_bus = true

[search]
first_mile_radius_m = 800
first_mile_fallback_k = 3
transfer_fallback_radius_m = 250
transfer_fallback_max_neighbors = 8
grid_candidate_radius_m = 500

[weights]
walk_speed_mps = 1.2
transfer_penalty_s = 180
wait_cap_s = 600

[grid]
cell_size_m = 250
max_candidates_per_cell = 12

[runtime]
max_time_s = 3600
max_seed_nodes = 24
isochrone_bucket_size_s = 300

[graph]
max_interstop_ride_s = 10800

[cities.paris]
label = "Paris"
artifact_version = "v2"

[cities.paris.paths]
gtfs_input = "offline/data/gtfs/paris"

[cities.paris.scope]
use_bbox = true
bbox = [1.70001, 48.40567, 2.91042, 49.15218] # min_lon, min_lat, max_lon, max_lat
default_view = [48.8566, 2.3522, 11]

[cities.paris.geocoding]
country_codes = "fr"
viewbox = "1.70001,48.40567,2.91042,49.15218"
bounded = true

[cities.paris.validation]
mape_threshold = 0.20
range_tolerance_ratio = 0.25
performance_p95_ms_threshold = 1500

[[cities.paris.validation.od_pairs]]
name = "Chatelet-Les Halles to La Defense"
from_lat = 48.8606
from_lon = 2.3479
to_lat = 48.8924
to_lon = 2.2369
expected_min_s = 600
expected_max_s = 2100

